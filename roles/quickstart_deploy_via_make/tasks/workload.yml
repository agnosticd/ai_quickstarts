---
- name: Setting up quickstart_deploy_via_make workload
  debug:
    msg: "Deploying {{ quickstart_deploy_via_make_repo_url }} ({{ quickstart_deploy_via_make_scm_ref }})"

# To Do: Implement your workload deployment tasks here
# -------------------------------------------------------------------------

- name: Log in to OpenShift cluster
  ansible.builtin.command:
    cmd: >-
      oc login {{ openshift_api_url }}
      --token={{ openshift_cluster_admin_token }}
      --insecure-skip-tls-verify=true

- name: Clone the Lab repo
  ansible.builtin.git:
    repo: "{{ quickstart_deploy_via_make_repo_url }}"
    dest: "~/quickstart-deploy-make-repo"
    version: "{{ quickstart_deploy_via_make_scm_ref }}"

- name: Run make install
  community.general.make:
    chdir: "~/quickstart-deploy-make-repo/{{ quickstart_deploy_via_make_directory }}"
    target: install
    params: "{{ quickstart_deploy_via_make_params }}"

# Leave this as the last task in the playbook.
# --------------------------------------------
- name: workload tasks complete
  debug:
    msg: "Workload Tasks completed successfully."
  when: not silent | default(false) | bool
