---
- name: Setting up workload for user
  debug:
    msg: "Setting up workload for user ocp_username = {{ ocp_username }}"

# To Do: Implement your workload deployment tasks here
# -------------------------------------------------------------------------

- name: Clone the Lab repo
  ansible.builtin.git:
    repo: "{{ quickstart_deploy_make_repo_url }}"
    dest: "~/quickstart-deploy-make-repo"
    version: "{{ quickstart_deploy_make_branch }}"

- name: Run make install
  community.general.make:
    chdir: "~/quickstart-deploy-make-repo/{{ quickstart_deploy_make_directory }}"
    target: install
    params: "{{ quickstart_deploy_make_params }}"

# Leave this as the last task in the playbook.
# --------------------------------------------
- name: workload tasks complete
  debug:
    msg: "Workload Tasks completed successfully."
  when: not silent|bool
